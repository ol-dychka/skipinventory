<div class="container" class="flex h-full items-center justify-center">
  <div class="space-y-12">
    <p class="text-center text-6xl font-bold text-gray-400">Register</p>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <app-auth-input type="text" label="Name" placeholder="Your Name" formControlName="name" />

      <app-auth-input
        type="email"
        label="Email"
        placeholder="you@example.com"
        formControlName="email"
        [error]="emailError"
      />

      <app-auth-input
        type="password"
        label="Password"
        placeholder="••••••••"
        formControlName="password"
        [error]="passwordError"
      />

      <div class="flex gap-2 pb-6">
        <p class="text-cyan-600">I am the business owner</p>
        <input class="accent-cyan-600" type="checkbox" formControlName="isOwner" />
      </div>

      <button
        class="w-full cursor-pointer rounded-lg bg-cyan-600 p-4 text-white transition-colors duration-300 hover:bg-cyan-700"
        type="submit"
        [disabled]="loading()"
      >
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>
    <p class="text-center text-gray-400">
      Already have an account?
      <a routerLink="/login" class="cursor-pointer underline hover:text-cyan-600">
        Login instead
      </a>
    </p>
  </div>
</div>
