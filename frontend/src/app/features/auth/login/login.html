<div class="container">
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <app-auth-input
      type="email"
      label="Email"
      placeholder="you@example.com"
      formControlName="email"
      [error]="emailError"
    />

    <app-auth-input
      type="password"
      label="Password"
      placeholder="••••••••"
      formControlName="password"
      [error]="passwordError"
    />

    <button type="submit" [disabled]="loading()" class="button">
      {{ loading() ? 'Signing in…' : 'Sign in' }}
    </button>
  </form>
</div>
