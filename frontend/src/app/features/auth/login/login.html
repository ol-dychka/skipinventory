<main class="login-container">
  <h1 class="title">Sign in</h1>

  <form [formGroup]="form" (ngSubmit)="submit()" aria-labelledby="login-heading" novalidate>
    <div class="field">
      <label for="email" class="label">Email</label>

      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="email"
        required
        [attr.aria-invalid]="emailInvalid"
      />

      @if (emailInvalid) {
        <p class="error" role="alert">Please enter a valid email</p>
      }
    </div>

    <div class="field">
      <label for="password" class="label">Password</label>

      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        required
      />
    </div>

    <button type="submit" [disabled]="form.invalid || loading()">
      @if (loading()) {
        Signing in...
      } @else {
        Login
      }
    </button>
  </form>
</main>
